<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>示範2_成語填字</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper: #f5e3b7;
      --paper-deep: #e6c985;
      --ink: #2b1a10;
      --muted: #806342;
      --red: #b22018;
      --red-soft: #f0b3a2;
      --gold: #c58b2c;
      --green: #2f8f57;
      --green-soft: #d9f0d4;
      --wood: #eed39b;
      --wood-line: rgba(125, 76, 32, 0.22);
      --shadow: rgba(79, 49, 18, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 14% 14%, rgba(255, 255, 255, 0.42), transparent 17%),
        radial-gradient(circle at 86% 18%, rgba(177, 32, 24, 0.08), transparent 18%),
        linear-gradient(135deg, var(--paper), #f9edc9 42%, var(--paper-deep));
      color: var(--ink);
      font-family: "Noto Serif TC", "Microsoft JhengHei", serif;
      line-height: 1.7;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(106, 72, 31, 0.06) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(rgba(106, 72, 31, 0.045) 1px, transparent 1px) 0 0 / 28px 28px,
        radial-gradient(circle, rgba(105, 75, 36, 0.07) 1px, transparent 1px) 0 0 / 18px 18px;
      mix-blend-mode: multiply;
    }

    .page {
      position: relative;
      width: min(980px, calc(100% - 28px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 26px 0 34px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 3px double rgba(125, 76, 32, 0.38);
    }

    h1 {
      margin: 0;
      color: #3b2113;
      font-size: clamp(36px, 6vw, 68px);
      line-height: 1.06;
      letter-spacing: 0;
      text-shadow: 0 3px 0 rgba(255, 255, 255, 0.54);
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-weight: 700;
    }

    .progress {
      min-width: 148px;
      padding: 12px 14px;
      border: 2px solid var(--gold);
      border-radius: 8px;
      background: rgba(255, 249, 228, 0.72);
      text-align: center;
      box-shadow: 0 10px 24px var(--shadow), inset 0 0 0 2px rgba(255, 255, 255, 0.32);
    }

    .progress span {
      display: block;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .progress strong {
      display: block;
      color: var(--red);
      font-size: 34px;
      line-height: 1.05;
      font-weight: 900;
    }

    .game-card {
      border: 3px solid rgba(125, 76, 32, 0.45);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(125, 76, 32, 0.06) 1px, transparent 1px) 0 0 / 22px 22px,
        linear-gradient(180deg, rgba(255, 249, 228, 0.86), rgba(242, 218, 158, 0.82));
      box-shadow: 0 18px 42px var(--shadow), inset 0 0 0 3px rgba(255, 255, 255, 0.28);
      overflow: hidden;
    }

    .question-area {
      padding: clamp(18px, 4vw, 34px);
      text-align: center;
    }

    .idiom {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(8px, 2.5vw, 18px);
      margin: 10px 0 20px;
      font-size: clamp(42px, 8vw, 86px);
      font-weight: 900;
      line-height: 1;
    }

    .idiom-char,
    .slot {
      width: clamp(62px, 13vw, 116px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 4px;
    }

    .idiom-char {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.25);
    }

    .slot {
      position: relative;
      border: 3px solid var(--red);
      background:
        linear-gradient(45deg, transparent calc(50% - 1px), rgba(178, 32, 24, 0.22) calc(50% - 1px), rgba(178, 32, 24, 0.22) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(-45deg, transparent calc(50% - 1px), rgba(178, 32, 24, 0.22) calc(50% - 1px), rgba(178, 32, 24, 0.22) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(90deg, transparent calc(50% - 1px), rgba(178, 32, 24, 0.22) calc(50% - 1px), rgba(178, 32, 24, 0.22) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(0deg, transparent calc(50% - 1px), rgba(178, 32, 24, 0.22) calc(50% - 1px), rgba(178, 32, 24, 0.22) calc(50% + 1px), transparent calc(50% + 1px)),
        rgba(255, 247, 220, 0.82);
      color: rgba(178, 32, 24, 0.34);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.55);
    }

    .slot::before {
      content: "□";
    }

    .slot.over {
      box-shadow: 0 0 0 5px rgba(178, 32, 24, 0.14), inset 0 0 0 2px rgba(255, 255, 255, 0.72);
    }

    .slot.filled::before {
      content: "";
    }

    .slot .tile {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      background: transparent;
      color: var(--red);
      box-shadow: none;
      cursor: default;
      font-size: inherit;
      transform: rotate(-2deg);
      animation: stampIn 260ms ease-out;
    }

    .feedback {
      min-height: 124px;
      display: grid;
      gap: 10px;
      justify-items: center;
      align-content: center;
      padding: 12px;
      border-top: 2px dashed rgba(125, 76, 32, 0.32);
    }

    .feedback h2 {
      margin: 0;
      color: var(--green);
      font-size: clamp(26px, 5vw, 44px);
      line-height: 1.1;
    }

    .feedback p {
      max-width: 720px;
      margin: 0;
      color: #5d432b;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
    }

    .feedback[hidden] {
      display: none;
    }

    .next-button,
    .restart-button {
      min-height: 46px;
      padding: 10px 20px;
      border: 0;
      border-radius: 999px;
      background: var(--red);
      color: #fff7dc;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 5px 0 #751911;
    }

    .next-button:active,
    .restart-button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #751911;
    }

    .bank-wrap {
      padding: clamp(16px, 3vw, 24px);
      border-top: 3px double rgba(125, 76, 32, 0.36);
      background: rgba(120, 72, 26, 0.08);
    }

    .bank-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      color: #5d351b;
      font-size: 20px;
      font-weight: 900;
    }

    .bank-title small {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .tile-bank {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      touch-action: none;
    }

    .tile {
      min-height: 66px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(125, 76, 32, 0.42);
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent 0 24%, var(--wood-line) 25% 26%, transparent 27% 50%, var(--wood-line) 51% 52%, transparent 53% 100%),
        linear-gradient(180deg, #fff1c6, var(--wood));
      color: #19100b;
      font: inherit;
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 900;
      cursor: grab;
      user-select: none;
      box-shadow: 0 8px 0 rgba(129, 76, 27, 0.28), 0 14px 24px rgba(85, 54, 18, 0.12);
      touch-action: none;
      transition: transform 130ms ease, box-shadow 130ms ease, background 130ms ease, border-color 130ms ease;
    }

    .tile:active {
      cursor: grabbing;
    }

    .tile.dragging {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0.95;
      transform: translate3d(var(--drag-x), var(--drag-y), 0) scale(1.06);
      box-shadow: 0 18px 36px rgba(68, 42, 17, 0.34);
    }

    .tile.correct {
      background: var(--green-soft);
      border-color: var(--green);
      color: var(--red);
    }

    .tile.wrong {
      animation: wrongFlash 200ms ease;
    }

    .placeholder {
      min-height: 66px;
      border: 2px dashed rgba(125, 76, 32, 0.28);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.22);
    }

    .result {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(61, 38, 16, 0.48);
      backdrop-filter: blur(4px);
    }

    .result.show {
      display: grid;
    }

    .result-card {
      width: min(430px, 100%);
      padding: 30px;
      border: 3px solid var(--gold);
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 244, 190, 0.75), transparent 42%),
        linear-gradient(180deg, #fff4cf, #eac474);
      text-align: center;
      box-shadow: 0 24px 60px rgba(67, 42, 17, 0.35);
    }

    .result-card h2 {
      margin: 0 0 8px;
      color: var(--red);
      font-size: 42px;
      line-height: 1.15;
    }

    .result-card p {
      margin: 0 0 20px;
      color: #583a22;
      font-size: 21px;
      font-weight: 900;
    }

    .map-link {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 70;
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      padding: 8px 13px;
      border: 2px solid var(--red);
      border-radius: 999px;
      background: rgba(255, 247, 220, 0.9);
      color: #5c2518;
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 8px 22px rgba(79, 49, 18, 0.22);
    }

    @keyframes stampIn {
      0% {
        opacity: 0;
        transform: scale(1.35) rotate(8deg);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(-2deg);
      }
    }

    @keyframes wrongFlash {
      0%, 100% {
        border-color: rgba(125, 76, 32, 0.42);
        background: linear-gradient(180deg, #fff1c6, var(--wood));
        transform: translateX(0);
      }
      45% {
        border-color: var(--red);
        background: #ffd8d1;
        transform: translateX(-6px);
      }
      70% {
        transform: translateX(6px);
      }
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 18px, 620px);
        padding-top: 16px;
      }

      header {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .progress {
        justify-self: start;
      }

      .tile-bank {
        display: flex;
        overflow-x: auto;
        padding-bottom: 12px;
        scroll-snap-type: x proximity;
      }

      .tile,
      .placeholder {
        min-width: 78px;
      }
    }
  </style>
</head>
<body>
  <a class="map-link" href="../大冒險地圖/index.html">← 回到大地圖</a>
  <div class="page">
    <header>
      <div>
        <h1>成語填字</h1>
        <p class="subtitle">拖曳字卡，補上成語裡缺少的兩個字。</p>
      </div>
      <div class="progress" aria-live="polite">
        <span>目前題數</span>
        <strong><span id="questionNumber">1</span>/5</strong>
      </div>
    </header>

    <main class="game-card">
      <section class="question-area">
        <div class="idiom" id="idiomDisplay" aria-label="成語填空"></div>
      </section>

      <section class="feedback" id="feedback" hidden>
        <h2>✓ 答對！</h2>
        <p id="meaningText"></p>
        <button class="next-button" id="nextButton" type="button">下一題</button>
      </section>

      <section class="bank-wrap">
        <div class="bank-title">
          <span>字卡區</span>
          <small>可用滑鼠或手指拖曳</small>
        </div>
        <div class="tile-bank" id="tileBank"></div>
      </section>
    </main>
  </div>

  <div class="result" id="resultDialog" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
    <div class="result-card">
      <h2 id="resultTitle">挑戰完成！</h2>
      <p id="scoreText">總成績：5 / 5</p>
      <button class="restart-button" id="restartButton" type="button">重新挑戰</button>
    </div>
  </div>

  <script>
    const QUESTIONS = [
      { 成語: "一鳴驚人", 缺字: [1, 2], 答案: ["鳴", "驚"], 意思: "比喻平時默默無聞，突然有驚人表現。" },
      { 成語: "風花雪月", 缺字: [1, 3], 答案: ["花", "月"], 意思: "原指四時景色，後比喻浮華空洞的詩文。" },
      { 成語: "三番五次", 缺字: [1, 3], 答案: ["番", "次"], 意思: "形容次數很多。" },
      { 成語: "一字千金", 缺字: [1, 3], 答案: ["字", "金"], 意思: "形容文字價值極高。" },
      { 成語: "畫龍點睛", 缺字: [1, 3], 答案: ["龍", "睛"], 意思: "比喻在關鍵處點明要旨，使內容更加生動有力。" },
      { 成語: "守株待兔", 缺字: [1, 3], 答案: ["株", "兔"], 意思: "比喻拘泥舊法，不知變通，或妄想不勞而獲。" },
      { 成語: "亡羊補牢", 缺字: [1, 3], 答案: ["羊", "牢"], 意思: "比喻出了差錯後及時補救，還不算太晚。" },
      { 成語: "杯弓蛇影", 缺字: [1, 2], 答案: ["弓", "蛇"], 意思: "比喻疑神疑鬼，自相驚擾。" },
      { 成語: "刻舟求劍", 缺字: [1, 3], 答案: ["舟", "劍"], 意思: "比喻拘泥成法，不懂得隨情勢變化而調整。" },
      { 成語: "狐假虎威", 缺字: [1, 2], 答案: ["假", "虎"], 意思: "比喻倚仗別人的權勢來嚇唬人。" },
      { 成語: "井底之蛙", 缺字: [1, 3], 答案: ["底", "蛙"], 意思: "比喻見識狹小的人。" },
      { 成語: "雪中送炭", 缺字: [1, 3], 答案: ["中", "炭"], 意思: "比喻在別人急需時給予幫助。" }
    ];

    const DISTRACTORS = "天地山水日雲雨雷電春秋冬海書心手口馬鳥魚火石玉林竹明暗高遠近左右上下";
    const ROUND_SIZE = 5;
    const CARD_COUNT = 15;

    const idiomDisplay = document.querySelector("#idiomDisplay");
    const tileBank = document.querySelector("#tileBank");
    const feedback = document.querySelector("#feedback");
    const meaningText = document.querySelector("#meaningText");
    const nextButton = document.querySelector("#nextButton");
    const restartButton = document.querySelector("#restartButton");
    const resultDialog = document.querySelector("#resultDialog");
    const scoreText = document.querySelector("#scoreText");
    const questionNumber = document.querySelector("#questionNumber");

    let roundQuestions = [];
    let currentIndex = 0;
    let correctCount = 0;
    let activeDrag = null;
    let audioContext = null;

    function shuffle(items) {
      const copy = [...items];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[randomIndex]] = [copy[randomIndex], copy[index]];
      }
      return copy;
    }

    function getAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
      return audioContext;
    }

    function playBell() {
      const ctx = getAudioContext();
      const now = ctx.currentTime;
      [660, 880, 1320].forEach((frequency, index) => {
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(frequency, now + index * 0.035);
        gain.gain.setValueAtTime(0.001, now + index * 0.035);
        gain.gain.exponentialRampToValueAtTime(0.06, now + index * 0.035 + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.28 + index * 0.035);
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start(now + index * 0.035);
        oscillator.stop(now + 0.32 + index * 0.035);
      });
    }

    function buildCards(question) {
      const answers = [...question.答案];
      const distractors = [...DISTRACTORS]
        .filter((char) => !answers.includes(char) && !question.成語.includes(char));
      const chosenDistractors = shuffle(distractors).slice(0, CARD_COUNT - answers.length);
      return shuffle([...answers, ...chosenDistractors]);
    }

    function renderQuestion() {
      const question = roundQuestions[currentIndex];
      const chars = [...question.成語];
      correctCount = 0;
      idiomDisplay.innerHTML = "";
      tileBank.innerHTML = "";
      feedback.hidden = true;
      questionNumber.textContent = String(currentIndex + 1);

      chars.forEach((char, index) => {
        if (question.缺字.includes(index)) {
          const answerIndex = question.缺字.indexOf(index);
          const slot = document.createElement("div");
          slot.className = "slot";
          slot.dataset.answer = question.答案[answerIndex];
          slot.dataset.filled = "false";
          idiomDisplay.appendChild(slot);
        } else {
          const fixedChar = document.createElement("div");
          fixedChar.className = "idiom-char";
          fixedChar.textContent = char;
          idiomDisplay.appendChild(fixedChar);
        }
      });

      buildCards(question).forEach((char, index) => {
        const tile = document.createElement("button");
        tile.className = "tile";
        tile.type = "button";
        tile.textContent = char;
        tile.dataset.char = char;
        tile.dataset.id = `tile-${currentIndex}-${index}`;
        tile.addEventListener("pointerdown", startDrag);
        tileBank.appendChild(tile);
      });
    }

    function startDrag(event) {
      const tile = event.currentTarget;
      if (tile.classList.contains("correct")) return;

      getAudioContext();
      event.preventDefault();
      tile.setPointerCapture(event.pointerId);

      const rect = tile.getBoundingClientRect();
      const placeholder = document.createElement("div");
      placeholder.className = "placeholder";
      placeholder.style.width = `${rect.width}px`;
      placeholder.style.height = `${rect.height}px`;
      tile.parentElement.insertBefore(placeholder, tile);

      activeDrag = {
        tile,
        placeholder,
        pointerId: event.pointerId,
        offsetX: event.clientX - rect.left,
        offsetY: event.clientY - rect.top,
        width: rect.width,
        height: rect.height
      };

      tile.style.width = `${rect.width}px`;
      tile.style.height = `${rect.height}px`;
      tile.classList.add("dragging");
      moveTile(event.clientX, event.clientY);

      tile.addEventListener("pointermove", dragMove);
      tile.addEventListener("pointerup", endDrag);
      tile.addEventListener("pointercancel", cancelDrag);
    }

    function moveTile(clientX, clientY) {
      if (!activeDrag) return;
      const x = clientX - activeDrag.offsetX;
      const y = clientY - activeDrag.offsetY;
      activeDrag.tile.style.setProperty("--drag-x", `${x}px`);
      activeDrag.tile.style.setProperty("--drag-y", `${y}px`);
    }

    function dragMove(event) {
      if (!activeDrag) return;
      event.preventDefault();
      moveTile(event.clientX, event.clientY);
      document.querySelectorAll(".slot.over").forEach((slot) => slot.classList.remove("over"));
      const target = document.elementFromPoint(event.clientX, event.clientY)?.closest(".slot");
      if (target && target.dataset.filled === "false") {
        target.classList.add("over");
      }
    }

    function endDrag(event) {
      if (!activeDrag) return;
      const target = document.elementFromPoint(event.clientX, event.clientY)?.closest(".slot");
      document.querySelectorAll(".slot.over").forEach((slot) => slot.classList.remove("over"));

      if (target && target.dataset.filled === "false" && target.dataset.answer === activeDrag.tile.dataset.char) {
        lockTile(target);
        return;
      }

      rejectTile();
    }

    function cancelDrag() {
      if (!activeDrag) return;
      rejectTile();
    }

    function cleanupDragListeners(tile) {
      tile.removeEventListener("pointermove", dragMove);
      tile.removeEventListener("pointerup", endDrag);
      tile.removeEventListener("pointercancel", cancelDrag);
    }

    function resetTilePosition(tile) {
      tile.classList.remove("dragging");
      tile.style.removeProperty("width");
      tile.style.removeProperty("height");
      tile.style.removeProperty("--drag-x");
      tile.style.removeProperty("--drag-y");
    }

    function lockTile(slot) {
      const { tile, placeholder } = activeDrag;
      cleanupDragListeners(tile);
      resetTilePosition(tile);
      placeholder.remove();
      tile.classList.add("correct");
      tile.removeEventListener("pointerdown", startDrag);
      slot.classList.add("filled");
      slot.dataset.filled = "true";
      slot.appendChild(tile);
      activeDrag = null;
      correctCount += 1;
      playBell();

      if (correctCount === 2) {
        showCorrectFeedback();
      }
    }

    function rejectTile() {
      const { tile, placeholder } = activeDrag;
      cleanupDragListeners(tile);
      resetTilePosition(tile);
      placeholder.replaceWith(tile);
      tile.classList.remove("wrong");
      void tile.offsetWidth;
      tile.classList.add("wrong");
      setTimeout(() => tile.classList.remove("wrong"), 220);
      activeDrag = null;
    }

    function showCorrectFeedback() {
      const question = roundQuestions[currentIndex];
      meaningText.textContent = question.意思;
      feedback.hidden = false;
      nextButton.textContent = currentIndex === ROUND_SIZE - 1 ? "看總成績" : "下一題";
    }

    function nextQuestion() {
      currentIndex += 1;
      if (currentIndex >= ROUND_SIZE) {
        localStorage.setItem("cert_idiom", "true");
        scoreText.textContent = `總成績：${ROUND_SIZE} / ${ROUND_SIZE}`;
        resultDialog.classList.add("show");
        return;
      }
      renderQuestion();
    }

    function startGame() {
      roundQuestions = shuffle(QUESTIONS).slice(0, ROUND_SIZE);
      currentIndex = 0;
      correctCount = 0;
      resultDialog.classList.remove("show");
      renderQuestion();
    }

    nextButton.addEventListener("click", nextQuestion);
    restartButton.addEventListener("click", startGame);
    startGame();
  </script>
</body>
</html>
