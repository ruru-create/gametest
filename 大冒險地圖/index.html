<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>大冒險地圖</title>
  <style>
    :root {
      --gold: #ffd166;
      --green: #43d17d;
      --red: #ff6464;
      --blue: #63d3ff;
      --muted: #bfd0ea;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080e1c;
      color: #fff;
      font-family: "Microsoft JhengHei", system-ui, sans-serif;
      overflow: hidden; /* Prevent scrolling since it's a full screen app */
      user-select: none;
      -webkit-user-select: none;
    }

    /* ─── 封面開場 ─── */
    .cover-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #000 url("cover.png") center center / cover no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 8%;
      cursor: pointer;
      transition: opacity 800ms ease, visibility 800ms ease;
    }

    .cover-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .cover-hint {
      font-size: clamp(20px, 3vw, 32px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 4px 8px rgba(0,0,0,0.8), 0 0 20px rgba(255,255,255,0.4);
      animation: pulseText 1.5s infinite alternate;
      background: rgba(0,0,0,0.4);
      padding: 10px 24px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    @keyframes pulseText {
      from { opacity: 0.6; transform: scale(0.98); }
      to   { opacity: 1; transform: scale(1.02); }
    }

    /* ─── UI 浮動層 (右上角) ─── */
    .top-ui {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(10, 16, 32, 0.75);
      padding: 8px 16px;
      border-radius: 999px;
      border: 2px solid rgba(255, 209, 102, 0.3);
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .held-count {
      color: var(--gold);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .btn-clear {
      border: none;
      background: rgba(255,100,100,0.2);
      color: #ffbaba;
      font-weight: 900;
      font-size: 14px;
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 150ms;
    }

    .btn-clear:hover { background: rgba(255,100,100,0.4); }

    /* ─── 大地圖容器 ─── */
    .map-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080e1c;
    }

    .map-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: calc(100vh * (16 / 9));
      max-height: calc(100vw * (9 / 16));
    }

    .map-bg-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    /* ─── 熱區 ─── */
    .hotspot {
      position: absolute;
      cursor: pointer;
      border-radius: 20%; /* 圓潤點 */
      transition: background 200ms, box-shadow 200ms;
      display: flex;
      align-items: center;
      justify-content: center;
      /* 測試時可以把 border 打開看位置，完成後關掉 */
      /* border: 2px dashed rgba(255,255,255,0.5); */ 
    }

    .hotspot:hover {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
    }

    .stamp {
      position: absolute;
      top: 10%;
      right: 10%;
      font-size: clamp(30px, 4vw, 50px);
      filter: drop-shadow(0 4px 4px rgba(0,0,0,0.6));
      display: none;
      pointer-events: none;
      animation: stampPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes stampPop {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .level-done .stamp { display: block; }

    /* ─── Modal ─── */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      place-items: center;
      padding: 16px;
      background: rgba(4,8,18,0.85);
      backdrop-filter: blur(8px);
    }

    .modal.show { display: grid; }

    .door-ui {
      width: min(800px, 100%);
      max-height: 95vh;
      overflow-y: auto;
      padding: 24px;
      border: 4px solid var(--gold);
      border-radius: 16px;
      background: radial-gradient(circle at 50% 0%, rgba(255,209,102,0.18), transparent 45%), linear-gradient(180deg, #1c2c48, #0c1425);
      box-shadow: 0 32px 90px rgba(0,0,0,0.6);
    }

    .door-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .door-head h2 {
      margin: 0;
      color: var(--gold);
      font-size: clamp(26px, 4vw, 42px);
    }

    .close-btn {
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 8px 16px;
      border-radius: 999px;
      font-weight: 900;
      cursor: pointer;
    }
    .close-btn:hover { background: rgba(255,255,255,0.2); }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .slot {
      min-height: 140px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 8px;
      border: 3px dashed rgba(255,209,102,0.4);
      border-radius: 12px;
      background: rgba(0,0,0,0.2);
      color: var(--muted);
      font-weight: 900;
      padding: 10px;
    }

    .slot.over { border-color: var(--blue); box-shadow: 0 0 0 5px rgba(99,211,255,0.15); }
    .slot.correct { border-style: solid; border-color: var(--green); background: rgba(67,209,125,0.15); color: #d8ffe4; }
    .slot.wrong { animation: shake 0.3s ease; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); border-color: var(--red); background: rgba(255,100,100,0.2); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .bag {
      padding: 16px;
      border: 3px solid #2a3f6a;
      border-radius: 12px;
      background: rgba(0,0,0,0.4);
    }

    .bag-title {
      color: var(--gold);
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      min-height: 60px;
      align-items: center;
    }

    .badge {
      min-width: 120px;
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 12px;
      border: 3px solid var(--gold);
      border-radius: 999px;
      background: #332410;
      color: var(--gold);
      font-weight: 900;
      cursor: grab;
      touch-action: none;
      box-shadow: 0 6px 0 rgba(0,0,0,0.3);
    }

    .badge:active { cursor: grabbing; }
    .badge.placed {
      border-color: var(--green);
      background: #173c27;
      color: #d8ffe4;
      cursor: default;
      box-shadow: none;
    }

    .badge.dragging {
      position: fixed;
      left: 0; top: 0;
      z-index: 70;
      pointer-events: none;
      transform: translate3d(var(--drag-x), var(--drag-y), 0) scale(1.05);
      opacity: 0.95;
    }

    .placeholder {
      min-width: 120px;
      min-height: 50px;
      border: 3px dashed rgba(255,209,102,0.3);
      border-radius: 999px;
    }

    .complete-panel {
      display: none;
      text-align: center;
      padding: 30px 10px;
    }

    .complete-panel.show { display: block; animation: fadeUp 0.6s ease-out; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .complete-panel h2 { color: var(--gold); font-size: 42px; margin-bottom: 16px; }
    .complete-panel p { font-size: 20px; font-weight: 900; margin-bottom: 24px; }
    
    .btn-again {
      background: linear-gradient(180deg, #ffd166, #eb9f28);
      color: #261707;
      border: none;
      padding: 12px 24px;
      font-size: 18px;
      font-weight: 900;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 6px 0 #8e5618;
      transition: transform 100ms, box-shadow 100ms;
    }
    .btn-again:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #8e5618; }
    .btn-again:active { transform: translateY(3px); box-shadow: 0 3px 0 #8e5618; }

  </style>
</head>
<body>

  <!-- 開場封面 -->
  <div id="coverScreen" class="cover-screen">
    <div class="cover-hint">點擊任何部位遊戲開始</div>
  </div>

  <!-- 地圖 UI -->
  <div class="top-ui">
    <div id="heldCount" class="held-count">持有：0 / 3</div>
    <button id="clearBtn" class="btn-clear">🔄 清除進度</button>
  </div>

  <!-- 大地圖 -->
  <div class="map-wrapper">
    <div class="map-container">
      <img src="map-bg.png" alt="Map Background" class="map-bg-img">
      
      <!-- 熱區：朝代 (依據提示: Top left) -->
      <div class="hotspot" id="hs-dynasty" style="top: 15%; left: 8%; width: 22%; height: 26%;" data-level="dynasty">
        <div class="stamp">✅</div>
      </div>
      
      <!-- 熱區：成語 (依據提示: Top right) -->
      <div class="hotspot" id="hs-idiom" style="top: 15%; left: 70%; width: 22%; height: 26%;" data-level="idiom">
        <div class="stamp">✅</div>
      </div>
      
      <!-- 熱區：打怪 (依據提示: Bottom left) -->
      <div class="hotspot" id="hs-warrior" style="top: 60%; left: 12%; width: 22%; height: 26%;" data-level="warrior">
        <div class="stamp">✅</div>
      </div>
      
      <!-- 熱區：中央大門 (依據提示: Center) -->
      <div class="hotspot" id="hs-gate" style="top: 38%; left: 38%; width: 24%; height: 32%;">
      </div>
    </div>
  </div>

  <!-- 通關大門 Modal -->
  <div class="modal" id="doorModal">
    <div class="door-ui" id="doorPuzzle">
      <div class="door-head">
        <h2>🔒 通關大門</h2>
        <button class="close-btn" id="closeDoorBtn">✕ 關閉</button>
      </div>

      <div class="slots" id="slots"></div>

      <div class="bag">
        <div class="bag-title">🎒 背包欄</div>
        <div class="badges" id="badges"></div>
      </div>
    </div>

    <div class="complete-panel" id="completePanel">
      <h2>🏆 冒險完成！</h2>
      <p id="timeText">總冒險時長：00 分 00 秒</p>
      <button class="btn-again" id="againBtn">🔄 再次冒險</button>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════
       關卡設定 (3 個)
    ═══════════════════════════════════════ */
    const LEVELS = [
      { id: "dynasty", name: "朝代配對", icon: "🎴", certName: "朝代之印", key: "cert_dynasty", href: "../示範1_朝代配對/index.html", slot: "朝代" },
      { id: "idiom",   name: "成語填字", icon: "📝", certName: "成語之印", key: "cert_idiom",   href: "../示範2_成語填字/index.html", slot: "成語" },
      { id: "warrior", name: "打怪 RPG", icon: "⚔️", certName: "勇者之印", key: "cert_warrior", href: "../示範3_打怪RPG/index.html", slot: "勇者" }
    ];

    const START_KEY = "adventure_start";
    const COVER_SEEN_KEY = "cover_seen";

    /* ─── DOM ─── */
    const coverScreen   = document.getElementById("coverScreen");
    const topUi         = document.querySelector(".top-ui");
    const heldCountText = document.getElementById("heldCount");
    const clearBtn      = document.getElementById("clearBtn");
    const againBtn      = document.getElementById("againBtn");
    const doorModal     = document.getElementById("doorModal");
    const closeDoorBtn  = document.getElementById("closeDoorBtn");
    const slotsEl       = document.getElementById("slots");
    const badgesEl      = document.getElementById("badges");
    const doorPuzzle    = document.getElementById("doorPuzzle");
    const completePanel = document.getElementById("completePanel");
    const timeText      = document.getElementById("timeText");

    let activeDrag  = null;
    let placedCount = 0;

    /* ═══════════════════════════════════════
       封面與初始化邏輯
    ═══════════════════════════════════════ */
    function initCover() {
      if (sessionStorage.getItem(COVER_SEEN_KEY)) {
        coverScreen.classList.add("hidden");
        ensureAdventureStart();
      } else {
        coverScreen.addEventListener("click", () => {
          coverScreen.classList.add("hidden");
          sessionStorage.setItem(COVER_SEEN_KEY, "true");
          ensureAdventureStart();
        });
      }
    }

    function ensureAdventureStart() {
      if (!localStorage.getItem(START_KEY)) {
        localStorage.setItem(START_KEY, String(Date.now()));
      }
    }

    function hasCert(level) {
      return localStorage.getItem(level.key) === "true" || localStorage.getItem(level.key) === "1";
    }

    function getOwnedLevels() {
      return LEVELS.filter(hasCert);
    }

    /* ═══════════════════════════════════════
       熱區綁定與狀態更新
    ═══════════════════════════════════════ */
    function updateMapState() {
      const owned = getOwnedLevels();
      heldCountText.textContent = `持有：${owned.length} / 3`;

      // 檢查熱區並更新 ✓ 狀態
      LEVELS.forEach(lvl => {
        const hs = document.getElementById(`hs-${lvl.id}`);
        if (hs) {
          if (hasCert(lvl)) hs.classList.add("level-done");
          else hs.classList.remove("level-done");
          
          // 綁定跳轉事件
          hs.onclick = () => { window.location.href = lvl.href; };
        }
      });

      // 中央大門熱區
      document.getElementById("hs-gate").onclick = openDoor;
    }

    function resetAllProgress() {
      if (!confirm("確定要清除所有進度嗎？下次會從封面重新開始。")) return;
      localStorage.clear();
      sessionStorage.clear();
      window.location.reload();
    }

    clearBtn.onclick = resetAllProgress;
    againBtn.onclick = () => {
      localStorage.clear();
      sessionStorage.clear();
      window.location.reload();
    };

    /* ═══════════════════════════════════════
       大門 Modal 與拖曳解謎
    ═══════════════════════════════════════ */
    function openDoor() {
      placedCount = 0;
      doorPuzzle.style.display = "block";
      completePanel.classList.remove("show");
      renderDoor();
      doorModal.classList.add("show");
    }

    closeDoorBtn.onclick = () => {
      doorModal.classList.remove("show");
      cleanupDrag();
    };

    doorModal.onclick = (e) => {
      if (e.target === doorModal) closeDoorBtn.click();
    };

    function renderDoor() {
      slotsEl.innerHTML = "";
      badgesEl.innerHTML = "";

      LEVELS.forEach(lvl => {
        const slot = document.createElement("div");
        slot.className = "slot";
        slot.dataset.cert = lvl.id;
        slot.innerHTML = `<div style="font-size:28px">${lvl.icon}</div><div>${lvl.slot}</div>`;
        addSlotEvents(slot);
        slotsEl.appendChild(slot);
      });

      const owned = getOwnedLevels();
      if (owned.length === 0) {
        badgesEl.innerHTML = `<div style="color:var(--muted); font-size:14px">目前沒有憑證，去探索地圖上的關卡吧！</div>`;
        return;
      }
      owned.forEach(lvl => badgesEl.appendChild(createBadge(lvl)));
    }

    function createBadge(level) {
      const badge = document.createElement("div");
      badge.className = "badge";
      badge.draggable = true;
      badge.dataset.cert = level.id;
      badge.innerHTML = `<span style="font-size:20px;margin-right:6px">${level.icon}</span>${level.certName}`;

      badge.addEventListener("dragstart", (e) => {
        if (badge.classList.contains("placed")) { e.preventDefault(); return; }
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", level.id);
        activeDrag = { badge };
      });
      badge.addEventListener("dragend", () => {
        badge.classList.remove("dragging");
        activeDrag = null;
      });
      badge.addEventListener("pointerdown", startPointerDrag);
      return badge;
    }

    function addSlotEvents(slot) {
      slot.addEventListener("dragover", e => { e.preventDefault(); slot.classList.add("over"); });
      slot.addEventListener("dragleave", () => slot.classList.remove("over"));
      slot.addEventListener("drop", e => {
        e.preventDefault();
        slot.classList.remove("over");
        const cert = e.dataTransfer.getData("text/plain");
        const badge = activeDrag?.badge || badgesEl.querySelector(`.badge[data-cert="${cert}"]`);
        tryPlaceBadge(badge, slot);
      });
    }

    /* ─── 觸控拖曳 (Pointer Events) ─── */
    function startPointerDrag(e) {
      const badge = e.currentTarget;
      if (badge.classList.contains("placed")) return;
      e.preventDefault();
      const rect = badge.getBoundingClientRect();
      const ph = document.createElement("span");
      ph.className = "placeholder";
      ph.style.width = `${rect.width}px`;
      ph.style.height = `${rect.height}px`;
      badge.parentElement.insertBefore(ph, badge);
      badge.setPointerCapture(e.pointerId);

      activeDrag = { badge, placeholder: ph, pointerId: e.pointerId, offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
      badge.style.width = `${rect.width}px`;
      badge.style.height = `${rect.height}px`;
      badge.classList.add("dragging");
      moveBadge(e.clientX, e.clientY);

      badge.addEventListener("pointermove", pointerMove);
      badge.addEventListener("pointerup", pointerUp);
      badge.addEventListener("pointercancel", pointerCancel);
    }

    function moveBadge(cx, cy) {
      if (!activeDrag?.badge) return;
      activeDrag.badge.style.setProperty("--drag-x", `${cx - activeDrag.offsetX}px`);
      activeDrag.badge.style.setProperty("--drag-y", `${cy - activeDrag.offsetY}px`);
    }

    function pointerMove(e) {
      if (!activeDrag) return;
      e.preventDefault();
      moveBadge(e.clientX, e.clientY);
      document.querySelectorAll(".slot.over").forEach(s => s.classList.remove("over"));
      const slot = document.elementFromPoint(e.clientX, e.clientY)?.closest(".slot");
      if (slot && !slot.classList.contains("correct")) slot.classList.add("over");
    }

    function pointerUp(e) {
      if (!activeDrag) return;
      const slot = document.elementFromPoint(e.clientX, e.clientY)?.closest(".slot");
      document.querySelectorAll(".slot.over").forEach(s => s.classList.remove("over"));
      if (slot) { tryPlaceBadge(activeDrag.badge, slot); return; }
      resetPointerBadge();
    }

    function pointerCancel() { resetPointerBadge(); }
    function cleanupDrag() { if (activeDrag?.badge) resetPointerBadge(); }

    function removePointerListeners(b) {
      b.removeEventListener("pointermove", pointerMove);
      b.removeEventListener("pointerup", pointerUp);
      b.removeEventListener("pointercancel", pointerCancel);
    }

    function resetPointerBadge() {
      const { badge, placeholder } = activeDrag;
      removePointerListeners(badge);
      badge.classList.remove("dragging");
      ["width","height","--drag-x","--drag-y"].forEach(p => badge.style.removeProperty(p));
      placeholder?.replaceWith(badge);
      activeDrag = null;
    }

    function tryPlaceBadge(badge, slot) {
      if (!badge || !slot || slot.classList.contains("correct")) {
        if (activeDrag?.placeholder) resetPointerBadge();
        return;
      }
      if (badge.dataset.cert !== slot.dataset.cert) {
        slot.classList.remove("wrong"); void slot.offsetWidth; slot.classList.add("wrong");
        setTimeout(() => slot.classList.remove("wrong"), 300);
        if (activeDrag?.placeholder) resetPointerBadge();
        return;
      }
      
      if (activeDrag?.placeholder) {
        activeDrag.placeholder.remove();
        removePointerListeners(badge);
        badge.classList.remove("dragging");
        ["width","height","--drag-x","--drag-y"].forEach(p => badge.style.removeProperty(p));
        activeDrag = null;
      }

      badge.classList.add("placed");
      badge.draggable = false;
      slot.classList.add("correct");
      slot.innerHTML = "";
      slot.appendChild(badge);
      placedCount++;
      if (placedCount === 3) setTimeout(showComplete, 400);
    }

    function showComplete() {
      const start = Number(localStorage.getItem(START_KEY) || Date.now());
      const secs = Math.max(0, Math.floor((Date.now() - start) / 1000));
      timeText.textContent = `總冒險時長：${Math.floor(secs / 60).toString().padStart(2,"0")} 分 ${(secs % 60).toString().padStart(2,"0")} 秒`;
      doorPuzzle.style.display = "none";
      completePanel.classList.add("show");
    }

    /* ─── 執行 ─── */
    initCover();
    updateMapState();

  </script>
</body>
</html>
