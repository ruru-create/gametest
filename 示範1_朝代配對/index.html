<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>示範1_朝代配對</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #130d0a;
      --panel: #211611;
      --panel-2: #2e1d15;
      --gold: #d6a84b;
      --gold-light: #ffe2a0;
      --paper: #f6e6bf;
      --red: #a82e25;
      --red-light: #f06455;
      --green: #2d8f5a;
      --green-light: #8ed9a8;
      --ink: #2e1a10;
      --text: #f9e8c6;
      --muted: #cdb78e;
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 14% 9%, rgba(214, 168, 75, 0.18), transparent 24%),
        radial-gradient(circle at 90% 18%, rgba(168, 46, 37, 0.14), transparent 22%),
        linear-gradient(135deg, #130d0a 0%, #21120d 52%, #0d0907 100%);
      color: var(--text);
      font-family: "Noto Serif TC", "Microsoft JhengHei", serif;
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(214, 168, 75, 0.05) 1px, transparent 1px) 0 0 / 42px 42px,
        linear-gradient(rgba(214, 168, 75, 0.04) 1px, transparent 1px) 0 0 / 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.18));
    }

    .page {
      position: relative;
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(214, 168, 75, 0.36);
    }

    h1 {
      margin: 0;
      color: var(--gold-light);
      font-size: clamp(34px, 5vw, 64px);
      line-height: 1.1;
      letter-spacing: 0;
      text-shadow: 0 4px 0 rgba(106, 44, 25, 0.72);
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 17px;
    }

    .attempts {
      min-width: 150px;
      padding: 12px 16px;
      border: 2px solid var(--gold);
      border-radius: 8px;
      background: rgba(33, 22, 17, 0.84);
      text-align: center;
      box-shadow: inset 0 0 0 1px rgba(255, 226, 160, 0.16), 0 12px 28px var(--shadow);
    }

    .attempts span {
      display: block;
      color: var(--muted);
      font-size: 14px;
    }

    .attempts strong {
      display: block;
      color: var(--gold-light);
      font-size: 34px;
      line-height: 1.1;
    }

    .board {
      display: grid;
      grid-template-columns: minmax(0, 1.28fr) minmax(310px, 0.72fr);
      gap: 20px;
      align-items: start;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      color: var(--gold-light);
      font-size: 21px;
      font-weight: 900;
    }

    .small-note {
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }

    .dynasty-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .dynasty-card {
      min-height: 204px;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 2px solid var(--gold);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(121, 65, 25, 0.1) 1px, transparent 1px) 0 0 / 18px 18px,
        linear-gradient(var(--paper), #ead098);
      box-shadow: 0 16px 32px var(--shadow), inset 0 0 0 2px rgba(255, 255, 255, 0.28);
      overflow: hidden;
    }

    .dynasty-name {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 2px solid rgba(128, 76, 30, 0.3);
      color: var(--ink);
      font-size: clamp(30px, 4vw, 44px);
      font-weight: 900;
      line-height: 1;
    }

    .dynasty-name small {
      color: #8a5d24;
      font-size: 13px;
      font-weight: 700;
    }

    .drop-zone {
      min-height: 132px;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 8px;
      padding: 12px;
      background: rgba(255, 250, 235, 0.42);
      transition: background 150ms ease, box-shadow 150ms ease;
    }

    .drop-zone.empty::before {
      content: "把事件卡拖到這裡";
      color: rgba(68, 39, 18, 0.46);
      font-size: 15px;
      font-weight: 700;
    }

    .drop-zone.drag-over {
      background: rgba(255, 226, 160, 0.7);
      box-shadow: inset 0 0 0 3px rgba(214, 168, 75, 0.72);
    }

    .event-bank {
      position: sticky;
      top: 16px;
      padding: 16px;
      border: 2px solid var(--gold);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(46, 29, 21, 0.96), rgba(24, 15, 11, 0.96));
      box-shadow: 0 16px 36px var(--shadow), inset 0 0 0 1px rgba(255, 226, 160, 0.14);
    }

    .event-list {
      display: grid;
      gap: 10px;
      max-height: 72vh;
      overflow: auto;
      padding: 2px 4px 2px 2px;
    }

    .event-card {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 10px 12px;
      border: 2px solid var(--red);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(168, 46, 37, 0.18), transparent 38%),
        var(--panel);
      color: var(--text);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
      cursor: grab;
      user-select: none;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, opacity 160ms ease;
    }

    .event-card:active {
      cursor: grabbing;
    }

    .event-card.dragging {
      opacity: 0.55;
      transform: scale(0.98);
    }

    .event-card.wrong {
      animation: wrongFlash 300ms ease;
    }

    .event-card.correct {
      min-height: 38px;
      max-width: 100%;
      padding: 6px 8px;
      border-color: var(--green-light);
      background: linear-gradient(180deg, #daf1d8, #9fd7a8);
      color: #173b24;
      box-shadow: none;
      cursor: default;
      font-size: 14px;
      font-weight: 900;
    }

    .event-card.correct .event-icon {
      width: 26px;
      height: 26px;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.58);
      color: inherit;
    }

    .event-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 50%;
      background: rgba(214, 168, 75, 0.16);
      font-size: 21px;
    }

    .event-text {
      min-width: 0;
      overflow-wrap: anywhere;
      font-weight: 700;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 22px;
      z-index: 20;
      background: rgba(12, 7, 5, 0.72);
      backdrop-filter: blur(4px);
    }

    .overlay.show {
      display: grid;
      animation: goldenGlow 900ms ease-out;
    }

    .result {
      width: min(460px, 100%);
      padding: 28px;
      border: 3px solid var(--gold-light);
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 226, 160, 0.4), transparent 42%),
        linear-gradient(180deg, #2c1b12, #160e0a);
      text-align: center;
      box-shadow: 0 0 54px rgba(214, 168, 75, 0.48), 0 28px 70px rgba(0, 0, 0, 0.5);
    }

    .result h2 {
      margin: 0 0 10px;
      color: var(--gold-light);
      font-size: 42px;
      letter-spacing: 0;
    }

    .result p {
      margin: 0 0 18px;
      color: var(--text);
      font-size: 20px;
      font-weight: 700;
    }

    .restart {
      min-height: 46px;
      padding: 10px 18px;
      border: 2px solid var(--gold-light);
      border-radius: 8px;
      background: var(--red);
      color: #fff8df;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 5px 0 #62160f;
    }

    .restart:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #62160f;
    }

    .map-link {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 30;
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      padding: 8px 13px;
      border: 2px solid var(--gold);
      border-radius: 999px;
      background: rgba(19, 13, 10, 0.86);
      color: var(--gold-light);
      text-decoration: none;
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.28);
    }

    @keyframes wrongFlash {
      0%, 100% {
        border-color: var(--red);
        transform: translateX(0);
      }
      25% {
        border-color: #ffdad6;
        background: #6f1813;
        transform: translateX(-8px);
      }
      50% {
        transform: translateX(8px);
      }
      75% {
        transform: translateX(-4px);
      }
    }

    @keyframes goldenGlow {
      0% {
        box-shadow: inset 0 0 0 0 rgba(255, 226, 160, 0);
      }
      45% {
        box-shadow: inset 0 0 120px 22px rgba(255, 207, 92, 0.38);
      }
      100% {
        box-shadow: inset 0 0 0 0 rgba(255, 226, 160, 0);
      }
    }

    @media (max-width: 820px) {
      .page {
        width: min(100% - 20px, 720px);
        padding-top: 18px;
      }

      header {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .attempts {
        justify-self: start;
      }

      .board {
        grid-template-columns: 1fr;
      }

      .event-bank {
        position: static;
        order: -1;
      }

      .event-list {
        display: flex;
        gap: 10px;
        max-height: none;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 10px;
        scroll-snap-type: x proximity;
      }

      .event-card {
        min-width: 220px;
        scroll-snap-align: start;
      }

      .event-card.correct {
        min-width: 0;
      }
    }

    @media (max-width: 560px) {
      .dynasty-grid {
        grid-template-columns: 1fr;
      }

      .dynasty-card {
        min-height: 176px;
      }
    }
  </style>
</head>
<body>
  <a class="map-link" href="../大冒險地圖/index.html">← 回到大地圖</a>
  <div class="page">
    <header>
      <div>
        <h1>朝代配對</h1>
        <p class="subtitle">把右邊的歷史事件拖到正確朝代。每次拖放都會計入嘗試次數。</p>
      </div>
      <div class="attempts" aria-live="polite">
        <span>嘗試次數</span>
        <strong id="attemptCount">0</strong>
      </div>
    </header>

    <main class="board">
      <section class="dynasty-area" aria-label="朝代配對區">
        <div class="section-title">
          <span>朝代</span>
          <span class="small-note">每格可放多張事件卡</span>
        </div>
        <div class="dynasty-grid" id="dynastyGrid"></div>
      </section>

      <aside class="event-bank" aria-label="事件卡區">
        <div class="section-title">
          <span>事件卡</span>
          <span class="small-note" id="remainingCount">16 張</span>
        </div>
        <div class="event-list" id="eventList"></div>
      </aside>
    </main>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
    <div class="result">
      <h2 id="resultTitle">過關！</h2>
      <p id="resultText">總嘗試次數：0</p>
      <button class="restart" id="restartButton" type="button">再玩一次</button>
    </div>
  </div>

  <script>
    const dynasties = [
      { id: 1, name: "秦" },
      { id: 2, name: "漢" },
      { id: 3, name: "唐" },
      { id: 4, name: "宋" },
      { id: 5, name: "明" },
      { id: 6, name: "清" }
    ];

    const events = [
      { id: "e1", dynasty_id: 1, text: "統一六國", icon: "⚔️" },
      { id: "e2", dynasty_id: 1, text: "修築萬里長城", icon: "🧱" },
      { id: "e3", dynasty_id: 1, text: "焚書坑儒", icon: "🔥" },
      { id: "e4", dynasty_id: 2, text: "張騫通西域", icon: "🐪" },
      { id: "e5", dynasty_id: 2, text: "文景之治", icon: "📜" },
      { id: "e6", dynasty_id: 2, text: "罷黜百家獨尊儒術", icon: "📖" },
      { id: "e7", dynasty_id: 3, text: "貞觀之治", icon: "👑" },
      { id: "e8", dynasty_id: 3, text: "安史之亂", icon: "💥" },
      { id: "e9", dynasty_id: 3, text: "玄奘西行取經", icon: "🧘" },
      { id: "e10", dynasty_id: 4, text: "王安石變法", icon: "📜" },
      { id: "e11", dynasty_id: 4, text: "岳飛抗金", icon: "🗡️" },
      { id: "e12", dynasty_id: 5, text: "鄭和下西洋", icon: "⛵" },
      { id: "e13", dynasty_id: 5, text: "永樂大典編成", icon: "📚" },
      { id: "e14", dynasty_id: 6, text: "鴉片戰爭", icon: "💣" },
      { id: "e15", dynasty_id: 6, text: "康熙盛世", icon: "🌅" },
      { id: "e16", dynasty_id: 6, text: "辛亥革命終結", icon: "🏛️" }
    ];

    const dynastyGrid = document.querySelector("#dynastyGrid");
    const eventList = document.querySelector("#eventList");
    const attemptCount = document.querySelector("#attemptCount");
    const remainingCount = document.querySelector("#remainingCount");
    const overlay = document.querySelector("#overlay");
    const resultText = document.querySelector("#resultText");
    const restartButton = document.querySelector("#restartButton");

    let attempts = 0;
    let completed = 0;
    let draggedCard = null;

    function shuffle(items) {
      const copy = [...items];
      for (let index = copy.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[randomIndex]] = [copy[randomIndex], copy[index]];
      }
      return copy;
    }

    function updateStatus() {
      attemptCount.textContent = attempts;
      remainingCount.textContent = `${events.length - completed} 張`;
    }

    function createEventCard(event) {
      const card = document.createElement("article");
      card.className = "event-card";
      card.id = event.id;
      card.draggable = true;
      card.dataset.dynastyId = String(event.dynasty_id);
      card.innerHTML = `
        <span class="event-icon" aria-hidden="true">${event.icon}</span>
        <span class="event-text">${event.text}</span>
      `;

      card.addEventListener("dragstart", (eventObject) => {
        if (card.classList.contains("correct")) {
          eventObject.preventDefault();
          return;
        }

        draggedCard = card;
        card.classList.add("dragging");
        eventObject.dataTransfer.effectAllowed = "move";
        eventObject.dataTransfer.setData("text/plain", card.id);
      });

      card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
        draggedCard = null;
      });

      return card;
    }

    function createDynastyCard(dynasty) {
      const card = document.createElement("article");
      card.className = "dynasty-card";
      card.innerHTML = `
        <div class="dynasty-name">
          <span>${dynasty.name}</span>
          <small>id ${dynasty.id}</small>
        </div>
        <div class="drop-zone empty" data-dynasty-id="${dynasty.id}" aria-label="${dynasty.name}朝掉落區"></div>
      `;

      const dropZone = card.querySelector(".drop-zone");

      dropZone.addEventListener("dragover", (eventObject) => {
        eventObject.preventDefault();
        eventObject.dataTransfer.dropEffect = "move";
        dropZone.classList.add("drag-over");
      });

      dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("drag-over");
      });

      dropZone.addEventListener("drop", (eventObject) => {
        eventObject.preventDefault();
        dropZone.classList.remove("drag-over");

        const cardId = eventObject.dataTransfer.getData("text/plain");
        const cardToDrop = draggedCard || document.getElementById(cardId);
        if (!cardToDrop || cardToDrop.classList.contains("correct")) return;

        attempts += 1;
        const targetDynastyId = dropZone.dataset.dynastyId;
        const eventDynastyId = cardToDrop.dataset.dynastyId;

        if (targetDynastyId === eventDynastyId) {
          cardToDrop.classList.add("correct");
          cardToDrop.draggable = false;
          dropZone.appendChild(cardToDrop);
          dropZone.classList.remove("empty");
          completed += 1;
          updateStatus();
          checkComplete();
          return;
        }

        updateStatus();
        cardToDrop.classList.remove("wrong");
        void cardToDrop.offsetWidth;
        cardToDrop.classList.add("wrong");
        setTimeout(() => {
          cardToDrop.classList.remove("wrong");
        }, 300);
      });

      return card;
    }

    function checkComplete() {
      if (completed !== events.length) return;
      localStorage.setItem("cert_dynasty", "true");
      resultText.textContent = `總嘗試次數：${attempts}`;
      overlay.classList.add("show");
    }

    function renderGame() {
      attempts = 0;
      completed = 0;
      draggedCard = null;
      dynastyGrid.innerHTML = "";
      eventList.innerHTML = "";
      overlay.classList.remove("show");

      dynasties.forEach((dynasty) => {
        dynastyGrid.appendChild(createDynastyCard(dynasty));
      });

      shuffle(events).forEach((event) => {
        eventList.appendChild(createEventCard(event));
      });

      updateStatus();
    }

    restartButton.addEventListener("click", renderGame);
    renderGame();
  </script>
</body>
</html>
